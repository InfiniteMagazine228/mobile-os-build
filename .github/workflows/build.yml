name: Build Mobile OS

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ccache \
            libncurses5-dev libssl-dev bc flex bison

      - name: Build OS
        run: |
          ./build.sh   # script của bạn để compile kernel hoặc ROM

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-os-build
          path: out/target/product/*.zip
