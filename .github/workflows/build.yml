name: Build Kernel

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ccache \
            libncurses5-dev libssl-dev bc flex bison

      - name: Clone kernel source
        run: git clone https://github.com/torvalds/linux.git kernel

      - name: Build kernel
        run: |
          cd kernel
          make O=out ARCH=arm64 defconfig
          make O=out ARCH=arm64 -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
